name: Deploy to Cluster

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Verify image exists
        run: |
          docker image inspect nyc-taxi-serving:$IMAGE_TAG > /dev/null 2>&1 || {
            echo "Image nyc-taxi-serving:$IMAGE_TAG not found. Run build first."
            exit 1
          }

      - name: Update serving manifest
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Get current file from mlops-platform repo
          RESP=$(curl -sf -H "Authorization: token $DEPLOY_TOKEN" \
            "http://gitea:3000/api/v1/repos/root/mlops-platform/contents/serving/serving.yaml")
          FILE_SHA=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          CONTENT=$(echo "$RESP" | python3 -c "
          import sys,json,base64
          print(base64.b64decode(json.load(sys.stdin)['content']).decode())")

          # Replace image tag
          UPDATED=$(echo "$CONTENT" | sed "s|image: nyc-taxi-serving:.*|image: nyc-taxi-serving:$IMAGE_TAG|")

          # Base64 encode
          ENCODED=$(echo "$UPDATED" | base64 | tr -d '\n')

          # Push update
          curl -sf -X PUT -H "Authorization: token $DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            "http://gitea:3000/api/v1/repos/root/mlops-platform/contents/serving/serving.yaml" \
            -d "{\"message\":\"ci: deploy serving image $IMAGE_TAG\",\"content\":\"$ENCODED\",\"sha\":\"$FILE_SHA\"}"

          echo "Updated serving manifest to nyc-taxi-serving:$IMAGE_TAG"
