name: Build Docker Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build training image
        run: |
          TAG=sha-${GITHUB_SHA::7}
          docker build -t water-quality-model:$TAG -t water-quality-model:latest .
          echo "Built water-quality-model:$TAG"

      - name: Build serving image
        run: |
          TAG=sha-${GITHUB_SHA::7}
          docker build -t water-quality-serving:$TAG -t water-quality-serving:latest -f Dockerfile.serving .
          echo "Built water-quality-serving:$TAG"
