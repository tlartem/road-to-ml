apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: airflow
  namespace: kube-system
spec:
  repo: https://airflow.apache.org
  chart: airflow
  targetNamespace: airflow
  valuesContent: |-
    executor: LocalExecutor

    webserver:
      defaultUser:
        enabled: true
        username: admin
        password: admin
        role: Admin
        email: admin@example.com
        firstName: Admin
        lastName: Admin
      extraVolumes:
        - name: dags
          hostPath:
            path: /Users/tlartem/road-to-ml/airflow-dags/dags
      extraVolumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags

    scheduler:
      extraVolumes:
        - name: dags
          hostPath:
            path: /Users/tlartem/road-to-ml/airflow-dags/dags
      extraVolumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags

    dagProcessor:
      extraVolumes:
        - name: dags
          hostPath:
            path: /Users/tlartem/road-to-ml/airflow-dags/dags
      extraVolumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags

    # DAGs: прод — git-sync, локалка — hostPath (выше)
    dags:
      persistence:
        enabled: false
      gitSync:
        enabled: false

    flower:
      enabled: false
    statsd:
      enabled: false
    pgbouncer:
      enabled: false
    triggerer:
      enabled: false

    postgresql:
      enabled: true
