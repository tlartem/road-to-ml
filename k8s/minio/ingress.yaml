apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: minio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"    # без лимита на размер upload (для загрузки данных)
spec:
  ingressClassName: nginx
  rules:
    - host: minio.local                   # домен из /etc/hosts
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio               # наш Service
                port:
                  number: 9001            # консоль
