apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: airflow
  namespace: kube-system
spec:
  repo: https://airflow.apache.org
  chart: airflow
  targetNamespace: airflow
  valuesContent: |-
    executor: LocalExecutor

    webserver:
      defaultUser:
        enabled: true
        username: admin
        password: admin
        role: Admin
        email: admin@example.com
        firstName: Admin
        lastName: Admin

    dags:
      gitSync:
        enabled: true
        repo: http://host.docker.internal:3000/root/airflow-dags.git
        branch: main
        subPath: dags
        wait: 30
        credentialsSecret: git-credentials

    flower:
      enabled: false
    statsd:
      enabled: false
    pgbouncer:
      enabled: false
    triggerer:
      enabled: false

    postgresql:
      enabled: true
