apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ml-drift
  namespace: monitoring
data:
  ml-drift-monitoring.json: |
    {
      "annotations": {"list": []},
      "description": "ML Model Drift Monitoring — Evidently metrics",
      "editable": true,
      "id": null,
      "title": "ML Model Drift Monitoring",
      "uid": "ml-drift-monitoring",
      "tags": ["ml", "drift", "evidently"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Dataset Drift Detected",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_dataset_drift", "legendFormat": "drift"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "NO DRIFT", "color": "green"}, "1": {"text": "DRIFT!", "color": "red"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
            }
          }
        },
        {
          "id": 2,
          "title": "Drift Share (fraction of drifted features)",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_drift_share", "legendFormat": "share"}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "yellow", "value": 0.3},
                {"color": "red", "value": 0.5}
              ]}
            }
          }
        },
        {
          "id": 3,
          "title": "Drifted Features Count",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_number_of_drifted_columns", "legendFormat": "count"}],
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "yellow", "value": 1},
                {"color": "red", "value": 3}
              ]}
            }
          }
        },
        {
          "id": 4,
          "title": "Total Features Monitored",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_number_of_columns", "legendFormat": "total"}],
          "fieldConfig": {"defaults": {"color": {"fixedColor": "blue", "mode": "fixed"}}}
        },
        {
          "id": 5,
          "title": "Drift Share Over Time",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_drift_share", "legendFormat": "drift share"}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "custom": {"fillOpacity": 20, "lineWidth": 2},
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "yellow", "value": 0.3},
                {"color": "red", "value": 0.5}
              ]},
              "color": {"mode": "thresholds"}
            }
          }
        },
        {
          "id": 6,
          "title": "Feature Drift Scores",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 4},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_feature_drift_score", "legendFormat": "{{feature}}"}],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 1,
              "thresholds": {"mode": "absolute", "steps": [
                {"color": "green", "value": null},
                {"color": "yellow", "value": 0.05},
                {"color": "red", "value": 0.1}
              ]}
            }
          },
          "options": {"orientation": "horizontal", "displayMode": "gradient"}
        },
        {
          "id": 7,
          "title": "Per-Feature Drift Over Time",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_feature_drift_score", "legendFormat": "{{feature}}"}],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "custom": {"fillOpacity": 10, "lineWidth": 2}
            }
          }
        },
        {
          "id": 8,
          "title": "Feature Drift Status (0=ok, 1=drifted)",
          "type": "state-timeline",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 20},
          "datasource": {"type": "prometheus", "uid": "VictoriaMetrics"},
          "targets": [{"expr": "evidently_feature_drifted", "legendFormat": "{{feature}}"}],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "OK", "color": "green"}, "1": {"text": "DRIFT", "color": "red"}}}
              ],
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
            }
          }
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
