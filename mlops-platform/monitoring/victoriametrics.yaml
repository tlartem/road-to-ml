apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      serviceAccountName: victoriametrics
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.108.1
          args:
            - -promscrape.config=/config/scrape.yml
            - -retentionPeriod=30d
            - -storageDataPath=/data
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoriametrics-pvc
        - name: config
          configMap:
            name: victoriametrics-config

---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: monitoring
spec:
  selector:
    app: victoriametrics
  ports:
    - port: 8428
      targetPort: 8428
      name: http
