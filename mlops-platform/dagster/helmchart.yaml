apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: dagster
  namespace: kube-system
spec:
  repo: https://dagster-io.github.io/helm
  chart: dagster
  targetNamespace: dagster
  valuesContent: |-
    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    dagsterDaemon:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    dagster-user-deployments:
      enabled: true
      deployments:
        - name: user-code
          image:
            repository: dagster-user-code
            tag: latest
            pullPolicy: Never
          dagsterApiGrpcArgs:
            - "-m"
            - "src.definitions"
          port: 3030
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 4Gi
          envSecrets: []
          envConfigMaps: []
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.mlflow.svc.cluster.local:5000"
            - name: VM_URL
              value: "http://victoriametrics.monitoring.svc.cluster.local:8428"
            - name: DATA_SOURCE
              value: "raw"
          volumes:
            - name: feast-data
              persistentVolumeClaim:
                claimName: feast-data
          volumeMounts:
            - name: feast-data
              mountPath: /feast-data

    postgresql:
      enabled: true
      auth:
        username: dagster
        password: dagster
        database: dagster

    runLauncher:
      type: K8sRunLauncher
      config:
        k8sRunLauncher:
          envSecrets: []

    ingress:
      enabled: false
