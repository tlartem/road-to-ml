apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: feast
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://host.docker.internal:3000/root/mlops-platform.git
    targetRevision: main
    path: feast
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
